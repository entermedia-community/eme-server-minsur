<div class="chat-landing" id="chatLanding">

  <div class="landing-glyph">
    <i class="bi bi-robot"></i>
  </div>

  <h1 class="landing-headline">[[How can I help you today?]]</h1>
  <p class="landing-sub">
    [[Ask questions about your documents, search your media library, or get step-by-step how-to guidance. I have full access to your files and metadata.]]
  </p>

  <!-- Mode pills -->
  <div class="mode-pills-row" id="chatModePills">
    <button class="mode-pill active" data-mode="rag">
      <i class="bi bi-search-heart"></i>[[Ask Documents]]
    </button>
    <button class="mode-pill" data-mode="howto">
      <i class="bi bi-question-circle"></i>[[How-To Help]]
    </button>
    <button class="mode-pill" data-mode="search">
      <i class="bi bi-funnel"></i>[[Search Files]]
    </button>
    <button class="mode-pill" data-mode="generate">
      <i class="bi bi-stars"></i>[[Generate Content]]
    </button>
  </div>

</div>
