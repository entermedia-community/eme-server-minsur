<div class="chat-input-wrap" id="chatInputWrap">
  #set($searchcategories = $mediaarchive.query("searchcategory").search())
  #if($searchcategories.size() > 0)
    <div class="suggestion-grid mx-auto" id="suggestionGrid">
      #foreach($cat in $searchcategories)
      <a class="suggestion-chip" href="#" data-suggestion="Query category: #text($cat)">
        <i class="bi bi-file-earmark-text chip-icon" style="color:#3b82f6;"></i>
        <span>#text($cat)</span>
      </a>
      #end
    </div>
  #end
  <div class="chat-input-inner" id="chatInputBox">

    <div class="chat-attachment-tray" id="chatAttachTray"></div>

    <textarea
      class="chat-textarea soft-scrollbar"
      id="chatTextarea"
      #if($module)
        placeholder="[[Ask the Collective Intelligence...]]"
      #else
        placeholder="[[Ask a question, search files, or get help... (Shift+Enter for new line)]]"
      #end
      rows="1"
      autocomplete="off"></textarea>

    <div class="chat-actions-bar">
      <div class="chat-actions-left">


      </div>

      <button class="chat-send-btn" id="chatSendBtn" disabled>
        <i class="bi bi-send-fill"></i>[[Send]]
      </button>
    </div>

  </div>
</div>
