<div class="people-card" data-category="${category}">
  <div class="people-card-header">
    <div class="people-avatar ${avatar}">
      <img src="${icon}" alt="${name} avatar">
    </div>
    <div class="people-meta">
      <div class="people-name">${name}</div>
      <div class="people-url">${url}</div>
    </div>
  </div>
  <p class="people-desc">${description}</p>
  <div class="people-footer">
    <span class="people-tag tag-dcategory">${category}</span>
    <a href="#" class="people-cta" target="_blank" rel="noopener">Chat</a>
  </div>
</div>
